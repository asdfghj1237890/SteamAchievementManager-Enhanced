[package]
name = "steam-core"
version = "0.1.0"
edition = "2021"
description = "Local Steam client (internal steamclient.dll interfaces) read/write layer, ported from gibbed's SAM."

[lib]
name = "steam_core"
path = "src/lib.rs"

# Standalone read-only probe: `cargo run --bin probe` lists which of the sample
# app IDs the logged-in Steam user owns. Safe — it never writes to Steam.
[[bin]]
name = "probe"
path = "src/bin/probe.rs"

# Read-only per-game achievement read: `cargo run --bin read-game <appid>`.
[[bin]]
name = "read-game"
path = "src/bin/read-game.rs"

# Read-only full-library scan timing: `cargo run --release --bin list-owned`.
[[bin]]
name = "list-owned"
path = "src/bin/list-owned.rs"

# File-only completion (no Steam connection, no launch): `cargo run --bin completion <appid>`.
[[bin]]
name = "completion"
path = "src/bin/completion.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ureq = "2"

[target.'cfg(windows)'.dependencies]
winreg = "0.52"
