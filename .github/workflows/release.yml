name: Release

# Build the Windows portable .exe and the macOS (Apple Silicon) .dmg, then attach
# BOTH to a single GitHub Release. Triggers on pushing a version tag like `v1.0.0`,
# or manually via the Actions tab. The two builds run in parallel and upload their
# binaries as workflow artifacts; a final `release` job publishes once — so there is
# no create-race between platforms and the release always gets both assets.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0). Created on the current commit if it does not exist.'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write # required to create the GitHub Release

jobs:
  # Fail fast if the git tag and the app's own version (what getVersion() reports)
  # disagree — otherwise a release built without bumping the version files would
  # immediately nag users to "update" to the version they just installed.
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag must match the app version
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          want="${tag#v}"
          conf=$(jq -r '.version' web/src-tauri/tauri.conf.json)
          pkg=$(jq -r '.version' web/package.json)
          if [ "$want" != "$conf" ] || [ "$want" != "$pkg" ]; then
            echo "::error::tag $tag (=$want) != versions (tauri.conf.json=$conf, package.json=$pkg). Bump both to $want before tagging."
            exit 1
          fi
          echo "version OK: $want"

  build-windows:
    needs: [verify-version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: web/src-tauri -> target
      - name: Install frontend dependencies
        working-directory: web
        run: npm ci
      # Portable single .exe — --no-bundle skips the NSIS/MSI installers, leaving
      # just target/release/app.exe.
      - name: Build portable executable (release, no installer)
        working-directory: web
        shell: bash
        run: npx --yes '@tauri-apps/cli@^2' build --no-bundle
      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: web/src-tauri/target/release/app.exe
          if-no-files-found: error

  build-macos:
    needs: [verify-version]
    runs-on: macos-latest # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: web/src-tauri -> target
      - name: Install frontend dependencies
        working-directory: web
        run: npm ci
      # Bundles "SAM Enhanced.app" into a .dmg. Host target on macos-latest is
      # aarch64-apple-darwin, so this is an Apple Silicon build.
      - name: Build .dmg (release, Apple Silicon)
        working-directory: web
        run: npx --yes '@tauri-apps/cli@^2' build --bundles dmg
      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: web/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts # -> artifacts/windows-exe/app.exe, artifacts/macos-dmg/*.dmg

      - name: Stage release assets
        id: stage
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          win="SteamAchievementManager-Enhanced-${tag}-windows-x64.exe"
          mac="SteamAchievementManager-Enhanced-${tag}-macos-arm64.dmg"
          cp artifacts/windows-exe/app.exe "$win"
          cp artifacts/macos-dmg/*.dmg "$mac"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "win=$win" >> "$GITHUB_OUTPUT"
          echo "mac=$mac" >> "$GITHUB_OUTPUT"

      # Single publisher, so a plain exists-check is race-free. Re-runnable: an
      # existing release (e.g. manual dispatch on an old tag) gets its assets
      # replaced via --clobber.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.stage.outputs.tag }}"
          win="${{ steps.stage.outputs.win }}"
          mac="${{ steps.stage.outputs.mac }}"
          notes=$'Cross-platform build.\n\n## Windows (portable)\nDownload the `.exe` and double-click it — no installation. Requires Windows 10/11 with the WebView2 runtime (preinstalled on current Windows).\n\n## macOS (Apple Silicon)\nDownload the `.dmg`, open it, and drag `SAM Enhanced` into Applications. This build is **unsigned**, so on first launch right-click the app -> Open -> Open, or run `xattr -cr "/Applications/SAM Enhanced.app"` once.\n\nBoth require Steam installed, running, and logged in.\n\n⚠️ This writes to your real Steam account when you unlock achievements or edit stats.'
          # This job has no checkout, so gh has no local git remote to infer the
          # repo from — pass it explicitly or `gh release` fails with
          # "not a git repository".
          repo="$GITHUB_REPOSITORY"
          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            echo "Release $tag exists — uploading assets."
            gh release upload "$tag" "$win" "$mac" --repo "$repo" --clobber
          else
            echo "Creating release $tag."
            gh release create "$tag" "$win" "$mac" --repo "$repo" --title "$tag" --notes "$notes"
          fi

  bump-latest-json:
    needs: [release]
    runs-on: ubuntu-latest
    # Serialize latest.json updates so concurrent/overlapping release runs can't
    # race each other when pushing the pointer.
    concurrency:
      group: latest-json
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Write latest.json from the release tag and push (monotonic)
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          new="${tag#v}"
          cur=$(jq -r '.version // "0.0.0"' latest.json 2>/dev/null || echo "0.0.0")
          # Refuse to downgrade: only write when new >= cur, so re-running an older
          # tag's release can't push an older version over a newer one.
          highest=$(printf '%s\n%s\n' "$new" "$cur" | sort -V | tail -1)
          if [ "$new" != "$cur" ] && [ "$highest" != "$new" ]; then
            echo "latest.json is at $cur; refusing to write older $new."
            exit 0
          fi
          printf '{ "version": "%s" }\n' "$new" > latest.json
          if git diff --quiet -- latest.json; then
            echo "latest.json already at $new — nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "ci: bump latest.json to $new"
          git push origin HEAD:master
