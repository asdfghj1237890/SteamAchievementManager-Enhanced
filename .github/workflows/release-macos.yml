name: Release macOS dmg

# Build the macOS (Apple Silicon) .dmg and attach it to a GitHub Release.
# Triggers on pushing a version tag like `v1.0.0`, or manually via the Actions tab.
# The build is unsigned (no Apple Developer cert), so first launch needs a
# right-click -> Open to get past Gatekeeper.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0). Created on the current commit if it does not exist.'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write # required to create the GitHub Release

jobs:
  macos-dmg:
    runs-on: macos-latest # Apple Silicon (arm64)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: web/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      # Compiles the frontend (beforeBuildCommand) and the Rust shell in release
      # mode, then bundles sam-web.app into a .dmg. Host target on macos-latest is
      # aarch64-apple-darwin, so this is an Apple Silicon build.
      - name: Build .dmg (release, Apple Silicon)
        working-directory: web
        run: npx --yes '@tauri-apps/cli@^2' build --bundles dmg

      - name: Stage release asset
        id: stage
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          dmg=$(ls web/src-tauri/target/release/bundle/dmg/*.dmg | head -n1)
          if [ -z "$dmg" ]; then echo "No .dmg produced" >&2; exit 1; fi
          asset="SteamAchievementManager-Enhanced-${tag}-macos-arm64.dmg"
          cp "$dmg" "$asset"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.stage.outputs.tag }}"
          asset="${{ steps.stage.outputs.asset }}"
          notes=$'macOS (Apple Silicon) build — a `.dmg`.\n\n**How to install:** download the `.dmg` below, open it, and drag `sam-web` into Applications.\n\nThis build is **unsigned**, so on first launch macOS Gatekeeper will block it. To open it:\n- Right-click the app -> Open -> Open, **or**\n- run `xattr -cr /Applications/sam-web.app` once.\n\nRequires:\n- macOS on Apple Silicon (M-series)\n- Steam installed, running, and logged in\n\n⚠️ This writes to your real Steam account when you unlock achievements or edit stats.'
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag exists — uploading asset."
            gh release upload "$tag" "$asset" --clobber
          else
            echo "Creating release $tag."
            gh release create "$tag" "$asset" --title "$tag" --notes "$notes"
          fi
